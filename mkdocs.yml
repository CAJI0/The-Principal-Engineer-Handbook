site_name: The Principal Engineer Handbook
site_description: Manuscript and publishing site for The Principal Engineer Handbook.
repo_name: The Principal Engineer Handbook
docs_dir: docs
site_dir: site
strict: true

theme:
  name: material
  language: en
  features:
    - content.code.copy
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - minify:
      minify_html: true
  - with-pdf:
      enabled_if_env: ENABLE_PDF_EXPORT
      output_path: pdf/the-principal-engineer-handbook.pdf
      cover_title: The Principal Engineer Handbook
      cover_subtitle: Author-approved manuscript export

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

extra:
  generator: false

nav:
  - Home: index.md
  - Manuscript:
      - Overview: manuscript/index.md
      - Front Matter: manuscript/front-matter.md
      - Chapters: manuscript/chapters/index.md
      - Appendices: manuscript/appendices/index.md
  - Maintainer Docs:
      - Overview: maintainer/index.md
      - Style Guide: maintainer/style-guide.md
      - Book Bible: maintainer/book-bible.md
      - Roadmap: maintainer/roadmap.md
      - Release Process: maintainer/release-process.md
      - Changelog: maintainer/changelog.md
