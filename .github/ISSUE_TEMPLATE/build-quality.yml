name: Build or quality issue
description: Track failures in build, linting, spell checking, links, or exports.
title: "Build/quality: "
labels:
  - quality
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - MkDocs
        - PDF export
        - markdownlint
        - Vale
        - Spell checker
        - Dead link checker
        - GitHub automation
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: Include command output or links to failed checks when available.
    validations:
      required: true

