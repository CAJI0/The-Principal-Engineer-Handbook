name: Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  markdown:
    name: Markdown lint and spelling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false
      - run: npm install
      - run: npm run lint:md
      - run: npm run lint:spelling

  vale:
    name: Vale
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: errata-ai/vale-action@v2
        with:
          files: docs
          fail_on_error: true

  links:
    name: Dead links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --config .lychee.toml "**/*.md"
          fail: true

  mkdocs:
    name: MkDocs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: mkdocs build --strict

  pdf:
    name: PDF export
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: ENABLE_PDF_EXPORT=1 mkdocs build --strict
